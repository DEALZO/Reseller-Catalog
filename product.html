<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details - Superb Deals</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
  header { background: #2874f0; color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 999; }
  header h1 a{color:white; text-decoration:none; font-size:20px;}
.container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
.product-box { display: flex; gap: 30px; background: white; padding: 20px; border-radius: 8px; }
.product-images { flex: 1; }
.product-images img.main { width: 100%; border-radius: 8px; margin-bottom:10px; }
.thumb-row{display:flex; gap:10px; flex-wrap:wrap;}
.thumb-row img{width:80px; height:80px; object-fit:cover; border-radius:5px; cursor:pointer; border:2px solid #ddd;}
.thumb-row img.active{border-color:#2874f0;}
.product-info { flex: 1; }
.product-info h1 { font-size: 24px; margin: 0 0 10px 0; line-height: 1.4; }
.price { color: #2874f0; font-size: 28px; font-weight: bold; margin: 10px 0; }
.product-info p { margin: 8px 0; color: #333; font-size: 15px; }
.product-code { color: #666; font-size: 14px; }
.btn-add { background: #2874f0; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-top:15px; }
.btn-add.added{ background: #dc3545; }
.related { margin-top: 30px; }
.related h2 { margin-bottom: 15px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
.card { background: white; padding: 10px; border-radius: 8px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.card img { width: 100%; height: 150px; object-fit: cover; }
.card p { margin: 5px 0; }
  @media(max-width:768px){.product-box{flex-direction: column;} }
</style>
</head>
<body>
<header>
  <h1><a href="index.html">← Superb Deals</a></h1>
</header>

<div class="container" id="product-detail"><div style="text-align:center; padding:50px;">Loading...</div></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTs1Tzfl93ZoAyrQRAF-RBq5lx6umpdDUnj8K3AT9LQx_FybHGRfe4tv9moie4QZ6GHpR5rSp81Eqx6/pub?output=csv";
let products = [];
let cart = JSON.parse(localStorage.getItem('cart')) || [];

async function loadProducts() {
  const response = await fetch(CSV_URL);
  const csvText = await response.text();
  products = csvToJSON(csvText);
  showProduct();
}

// YE WALA NAYA SMART CSV PARSER HAI
function csvToJSON(csv) {
  csv = csv.replace(/^\uFEFF/, '');
  const lines = csv.split('\n').filter(line => line.trim());
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map((line, i) => {
    const values = parseCSVLine(line);
    let obj = {id: i};
    headers.forEach((h, j) => { obj[h] = (values[j] || '').trim(); });
    return obj;
  });
}

// Ye function " " ke andar wale comma ko nahi todega
function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"' && line[i-1]!== '\\') {
      inQuotes =!inQuotes;
    } else if (char === ',' &&!inQuotes) {
      result.push(current.replace(/^"|"$/g, ''));
      current = '';
    } else {
      current += char;
    }
  }
  result.push(current.replace(/^"|"$/g, ''));
  return result;
}

function getProductId() {
  const urlParams = new URLSearchParams(window.location.search);
  return parseInt(urlParams.get('id'));
}

function showProduct() {
  const id = getProductId();
  const p = products[id];
  if(!p) return;
  const inCart = cart.find(item => item.id == p.id);
  const btnText = inCart? 'Remove from Cart' : 'Add to Cart';
  const btnClass = inCart? 'btn-add added' : 'btn-add';

  let images = [p['Image1'], p['Image2'], p['Image3'], p['Image4']].filter(Boolean);
  let thumbs = images.map((img, i)=> `<img src="${img}" class="${i==0?'active':''}" onclick="changeMainImg(this, '${img}')">`).join('');

  let html = `<div class="product-box">
    <div class="product-images">
      <img class="main" id="mainImg" src="${images[0]}" alt="${p['Product Name']}">
      <div class="thumb-row">${thumbs}</div>
    </div>
    <div class="product-info">
      <h1>${p['Product Name']}</h1>
      <div class="price">Rs. ${p['Price']}</div>
      <p class="product-code">Product Code: PROD${p.id}</p>
      <p><b>DESCRIPTION:</b><br>${p['Description'] || 'No description available.'}</p>
      <button class="${btnClass}" onclick='toggleCartItem(${JSON.stringify(p).replace(/'/g, "&apos;")})'>${btnText}</button>
    </div>
  </div>`;

  const related = products.filter(x => x['Category'] === p['Category'] && x.id!== p.id);
  html += `<div class="related"><h2>More in ${p['Category']}</h2><div class="grid">`;
  related.forEach(r => {
    html += `<div class="card" onclick="window.location.href='product.html?id=${r.id}'">
      <img src="${r['Image1']}">
      <p>${r['Product Name']}</p>
      <b>Rs. ${r['Price']}</b>
    </div>`;
  });
  html += `</div></div>`;
  document.getElementById('product-detail').innerHTML = html;
}

function changeMainImg(el, src){ document.getElementById('mainImg').src = src; document.querySelectorAll('.thumb-row img').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }

function toggleCartItem(p) {
  const existIndex = cart.findIndex(item => item.id == p.id);
  if(existIndex > -1){ cart.splice(existIndex, 1); } else { cart.push({...p, qty: 1}); }
  localStorage.setItem('cart', JSON.stringify(cart));
  showProduct();
}

loadProducts();
</script>
</body>
</html>
