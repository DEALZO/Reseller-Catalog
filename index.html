<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashing Deals - Shop</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#f5f5f5}
    header{background:#ff5722;color:white;padding:15px;position:sticky;top:0;z-index:999}
  .header-top{display:flex;justify-content:space-between;align-items:center}
  .logo{font-size:24px;font-weight:bold}
  .cart-btn{background:white;color:#ff5722;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;font-weight:bold}

  .banner-container{width:100%;max-width:1200px;margin:20px auto;padding:0 15px}
  .banner-container img{width:100%;height:auto;border-radius:12px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}

  .filters{max-width:1200px;margin:10px auto;padding:15px;display:flex;gap:10px;flex-wrap:wrap}
  .filters select{padding:10px;border:1px solid #ddd;border-radius:5px}
  .container{max-width:1200px;margin:20px auto;padding:0 15px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
  .card{background:white;border-radius:10px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
  .card img{width:100%;height:250px;object-fit:cover}
  .card-body{padding:15px}
  .card-title{font-size:16px;font-weight:bold;margin-bottom:5px}
  .price{color:#ff5722;font-size:18px;font-weight:bold}
  .old-price{text-decoration:line-through;color:gray;font-size:14px;margin-left:5px}
  .btn{background:#ff5722;color:white;border:none;padding:10px;width:100%;border-radius:5px;cursor:pointer;margin-top:10px}

    /* CART FIX - BAS YAHAN 2 LINE BADLI HAIN */
  .cart-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;z-index:999}
  .cart-modal{
        position:fixed;top:0;right:-400px;width:400px;height:100vh;
        background:white;box-shadow:-2px 0 10px rgba(0,0,0,0.1);
        transition:right 0.3s;z-index:1000;display:flex;flex-direction:column
    }
  .cart-modal.active{right:0}
  .cart-header{padding:20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;flex-shrink:0} /* flex-shrink:0 add */
  .cart-items{
        flex:1;
        overflow-y:auto; /* SCROLL */
        padding:20px
    }
  .cart-item{display:flex;gap:10px;margin-bottom:15px;border-bottom:1px solid #eee;padding-bottom:15px}
  .cart-item img{width:60px;height:60px;object-fit:cover;border-radius:5px}
  .cart-footer{padding:20px;border-top:1px solid #eee;background:white;flex-shrink:0} /* background + flex-shrink:0 add */
  .loading{text-align:center;padding:50px;font-size:18px}

    @media(max-width:768px){
      .cart-modal{width:100%}
    }
</style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo">Dashing Deals</div>
        <button class="cart-btn" onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
    </div>
</header>

<div class="banner-container">
    <img src="https://via.placeholder.com/1200x400/ff5722/ffffff?text=Big+Sale+50%+OFF" alt="Sale Banner">
    <img src="https://via.placeholder.com/1200x400/2196f3/ffffff?text=New+Arrivals" alt="New Arrivals">
</div>

<div class="filters">
    <select id="categoryFilter" onchange="filterProducts()"><option value="">All Categories</option></select>
</div>

<div class="container">
    <div id="grid" class="grid"><div class="loading">Loading products...</div></div>
</div>

<div class="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-modal" id="cartModal">
    <div class="cart-header">
        <h2>Your Cart</h2>
        <span onclick="toggleCart()" style="cursor:pointer;font-size:24px">X</span>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
        <h3>Total: Rs <span id="cartTotal">0</span></h3>
        <button class="btn" onclick="checkout()">Order on WhatsApp</button>
    </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTs1Tzfl93ZoAyrQRAF-RBq5lx6umpdDUnj8K3AT9LQx_FybHGRfe4tv9moie4QZ6GHpR5rSp81Eqx6/pub?output=csv";

let products = [];
let cart = [];
let filteredProducts = [];

async function loadProducts() {
  try {
    const response = await fetch(CSV_URL + "&t=" + new Date().getTime());
    const csvText = await response.text();
    products = csvToJSON(csvText);
    filteredProducts = products;
    buildFilters();
    displayProducts();
  } catch (err) {
    document.getElementById('grid').innerHTML = '<div class="loading">Error: Products load nahi ho rahe. Sheet check karo.</div>';
  }
}

function csvToJSON(csv) {
  const lines = csv.split('\n').filter(line => line.trim());
  const headers = lines.shift().split(',').map(h => h.trim().toLowerCase());
  return lines.map(line => {
    const values = line.split(',');
    let obj = {};
    headers.forEach((h, i) => { obj[h] = (values[i] || '').trim(); });
    return obj;
  });
}

function buildFilters(){
    const cats = [...new Set(products.map(p=>p.category))];
    cats.forEach(c=>{
        document.getElementById('categoryFilter').innerHTML += `<option value="${c}">${c}</option>`
    })
}

function displayProducts(){
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    filteredProducts.forEach(p=>{
        grid.innerHTML += `
        <div class="card">
            <img src="${p.image}" onerror="this.src='https://via.placeholder.com/250'">
            <div class="card-body">
                <div class="card-title">${p.name}</div>
                <div><span class="price">Rs ${p.price}</span> <span class="old-price">Rs ${p.oldprice}</span></div>
                <button class="btn" onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
            </div>
        </div>`
    })
}

function filterProducts(){
    const cat = document.getElementById('categoryFilter').value;
    filteredProducts = cat? products.filter(p=>p.category==cat) : products;
    displayProducts();
}

function addToCart(p){
    p.price = parseFloat(p.price); // ye total sahi karne ke liye
    const ex = cart.find(i=>i.name==p.name);
    if(ex) ex.qty++; else cart.push({...p,qty:1});
    updateCart();
}

function updateCart(){
    document.getElementById('cartCount').innerText = cart.reduce((a,b)=>a+b.qty,0);
    const cartItems = document.getElementById('cartItems');
    cartItems.innerHTML = '';
    let total = 0;
    cart.forEach(i=>{
        total += i.price * i.qty;
        cartItems.innerHTML += `
        <div class="cart-item">
            <img src="${i.image}" onerror="this.src='https://via.placeholder.com/60'">
            <div>
                <div>${i.name}</div>
                <div>Rs ${i.price} x ${i.qty}</div>
            </div>
        </div>`
    })
    document.getElementById('cartTotal').innerText = total.toFixed(0);
}

function toggleCart(){
    document.getElementById('cartModal').classList.toggle('active');
    document.querySelector('.cart-overlay').style.display =
        document.getElementById('cartModal').classList.contains('active')? 'block' : 'none';
}

function checkout(){
    let msg = "Order Details:%0A";
    cart.forEach(i=>msg += `${i.name} x ${i.qty} = Rs ${i.price*i.qty}%0A`);
    msg += `Total: Rs ${document.getElementById('cartTotal').innerText}`;
    window.open(`https://wa.me/92XXXXXXXXXX?text=${msg}`);
}

loadProducts();
</script>

</body>
</html>
