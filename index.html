<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reseller Catalog</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5}
header{background:#2563eb;color:white;padding:15px;text-align:center}
input,select{width:90%;padding:10px;margin:10px 5%;border:1px solid #ddd;border-radius:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:12px}
.card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.card img{width:100%;height:160px;object-fit:cover}
.card h3{font-size:16px;margin:8px}
.card p{margin:8px;color:#2563eb;font-weight:bold}
.loading{text-align:center;padding:40px;color:#666}
</style>
</head>
<body>
<header><h2>Superb Deals Catalog</h2></header>

<input type="text" id="search" placeholder="Search products...">
<select id="category"><option value="">All Categories</option></select>

<div id="products" class="loading">Loading products...</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTs1Tzfl93ZoAyrQRAF-RBq5lx6umpdDUnj8K3AT9LQx_FybHGRfe4tv9moie4QZ6GHpR5rSp81Eqx6/pub?output=csv";

let products = [];

fetch(CSV_URL)
 .then(res => res.text())
 .then(csv => {
    const rows = csv.split('\n').slice(1);
    products = rows.map(row => {
      const cols = row.split(',');
      return {
        name: cols[0],
        price: cols[1],
        image: cols[2],
        category: cols[3],
        stock: cols[4],
        description: cols[5]
      }
    }).filter(p => p.name);
    
    renderProducts(products);
    loadCategories();
  })
 .catch(err => {
    document.getElementById('products').innerHTML = '<div class="loading">Error loading products. Check if Sheet is published as CSV.</div>';
  });

function renderProducts(list){
  document.getElementById('products').innerHTML = '<div class="grid">' + list.map(p => `
    <div class="card">
      <img src="${p.image}" onerror="this.src='https://via.placeholder.com/160'">
      <h3>${p.name}</h3>
      <p>Rs ${p.price}</p>
    </div>
  `).join('') + '</div>';
}

function loadCategories(){
  const cats = [...new Set(products.map(p => p.category).filter(c => c))];
  document.getElementById('category').innerHTML += cats.map(c => `<option>${c}</option>`).join('');
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderProducts(products.filter(p => p.name.toLowerCase().includes(q)));
});

document.getElementById('category').addEventListener('change', e => {
  const cat = e.target.value;
  renderProducts(cat? products.filter(p => p.category === cat) : products);
});
</script>
</body>
</html>
